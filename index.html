<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meus Links — KAES</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0e;
  --surface: #1a1a18;
  --surface2: #242422;
  --surface3: #2e2e2c;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0efec;
  --text2: #a0a09c;
  --text3: #5a5a57;
  --accent: #5DCAA5;
  --accent-dim: #0F6E56;
  --accent-bg: rgba(93,202,165,0.1);
  --danger: #f87171;
  --radius: 12px;
  --radius-sm: 8px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f2;
    --surface: #ffffff;
    --surface2: #f0efec;
    --surface3: #e8e7e3;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.15);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #aaa;
    --accent: #0F6E56;
    --accent-dim: #085041;
    --accent-bg: rgba(15,110,86,0.08);
    --danger: #dc2626;
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2.5rem 1.25rem 4rem;
}

.container { max-width: 660px; margin: 0 auto; }

.top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 1.75rem;
  gap: 12px;
}

.brand { display: flex; flex-direction: column; gap: 2px; }

.brand-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
}

.brand h1 {
  font-size: 24px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
}

.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 22px;
  height: 22px;
  padding: 0 6px;
  background: var(--accent-bg);
  color: var(--accent);
  font-size: 12px;
  font-weight: 500;
  border-radius: 20px;
  margin-left: 8px;
  vertical-align: middle;
}

.add-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.add-btn:hover { opacity: 0.85; }
.add-btn:active { transform: scale(0.97); }

.search-wrap {
  position: relative;
  margin-bottom: 10px;
}

.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  pointer-events: none;
  width: 16px; height: 16px;
}

#search {
  width: 100%;
  height: 40px;
  padding: 0 12px 0 36px;
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--text3); }

.add-form {
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  display: none;
  flex-direction: column;
  gap: 8px;
}
.add-form.open { display: flex; }

.add-form input[type="text"],
.add-form input[type="url"] {
  width: 100%;
  height: 38px;
  padding: 0 12px;
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
.add-form input:focus { border-color: var(--accent); }
.add-form input::placeholder { color: var(--text3); }

.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  padding-top: 2px;
}

.btn-cancel {
  height: 34px;
  padding: 0 14px;
  background: none;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  transition: background 0.12s;
}
.btn-cancel:hover { background: var(--surface3); }

.btn-save {
  height: 34px;
  padding: 0 14px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: opacity 0.12s;
}
.btn-save:hover { opacity: 0.85; }

.meta {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 10px;
  padding-left: 2px;
}

.link-list { display: flex; flex-direction: column; gap: 5px; }

.link-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  transition: border-color 0.15s, background 0.15s;
  cursor: default;
}
.link-item:hover {
  border-color: var(--border2);
  background: var(--surface2);
}

.favicon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  flex-shrink: 0;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border: 0.5px solid var(--border);
}
.link-item:hover .favicon { background: var(--surface3); }
.favicon img { width: 18px; height: 18px; display: block; }
.favicon svg { width: 15px; height: 15px; color: var(--text3); }

.link-info { flex: 1; min-width: 0; }

.link-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.link-url {
  font-size: 11.5px;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}

.link-tag {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 20px;
  flex-shrink: 0;
  white-space: nowrap;
}
.tag-juridico  { background: rgba(93,202,165,0.12); color: #5DCAA5; }
.tag-kaes      { background: rgba(55,138,221,0.12); color: #60a5fa; }
.tag-ios       { background: rgba(239,159,39,0.12); color: #EF9F27; }
.tag-cobranca  { background: rgba(239,159,39,0.12); color: #EF9F27; }
.tag-extensao  { background: rgba(175,169,236,0.12); color: #AFA9EC; }
.tag-default   { background: var(--surface2); color: var(--text2); }

@media (prefers-color-scheme: light) {
  .tag-juridico  { background: #E1F5EE; color: #0F6E56; }
  .tag-kaes      { background: #E6F1FB; color: #185FA5; }
  .tag-ios       { background: #FAEEDA; color: #854F0B; }
  .tag-cobranca  { background: #FAEEDA; color: #854F0B; }
  .tag-extensao  { background: #EEEDFE; color: #534AB7; }
  .tag-default   { background: var(--surface2); color: var(--text2); }
}

.link-actions { display: flex; gap: 3px; flex-shrink: 0; }

.icon-btn {
  width: 30px; height: 30px;
  padding: 0; border: none;
  border-radius: 7px;
  background: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text3);
  transition: background 0.12s, color 0.12s;
  text-decoration: none;
}
.icon-btn:hover { background: var(--surface3); color: var(--text2); }
.icon-btn.danger:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

.empty {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text3);
  font-size: 14px;
}
.empty svg { width: 40px; height: 40px; display: block; margin: 0 auto 14px; opacity: 0.25; }

.divider {
  height: 0.5px;
  background: var(--border);
  margin: 1.25rem 0;
}
</style>
</head>
<body>
<div class="container">

  <div class="top">
    <div class="brand">
      <span class="brand-label">KAES</span>
      <h1>Meus Links <span class="badge" id="badge">0</span></h1>
    </div>
    <button class="add-btn" onclick="toggleForm()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Novo link
    </button>
  </div>

  <div class="add-form" id="addForm">
    <input type="text" id="newTitle" placeholder="Nome (ex: Relatório Jurídico)" />
    <input type="url" id="newUrl" placeholder="https://…" />
    <div class="form-actions">
      <button class="btn-cancel" onclick="toggleForm()">Cancelar</button>
      <button class="btn-save" onclick="saveLink()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        Salvar
      </button>
    </div>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="Buscar links…" oninput="renderList()" />
  </div>

  <div class="meta" id="countEl"></div>
  <div class="link-list" id="list"></div>
</div>

<script>
var KEY = 'meus_links_v1';

var DEFAULT_LINKS = [
  { id: 1, title: 'Gerar Relatório [Jurídico]',       url: 'https://maiscontratos3-rgb.github.io/Relatorio-Juridico/' },
  { id: 2, title: 'Lista de Contratos - KAES',         url: 'https://github.com/maiscontratos3-rgb/Contratos' },
  { id: 3, title: 'Atalho - IOS [Cobrança]',           url: 'https://github.com/maiscontratos3-rgb/AtalhoIOS' },
  { id: 4, title: 'Extensão - Asaas [Cobrança]',       url: 'https://github.com/maiscontratos3-rgb/ExtAsaas' },
  { id: 5, title: 'Extensão - Autentique [Lista]',     url: 'https://github.com/maiscontratos3-rgb/ExtensaoAutentique' },
  { id: 6, title: 'Asaas - Preencher Cliente [iOS]',     url: 'https://maiscontratos3-rgb.github.io/Asaasfill/' }
];

function load() {
  try {
    var s = localStorage.getItem(KEY);
    if (s) return JSON.parse(s);
    localStorage.setItem(KEY, JSON.stringify(DEFAULT_LINKS));
    return DEFAULT_LINKS;
  } catch(e) { return DEFAULT_LINKS; }
}
function save(links) { try { localStorage.setItem(KEY, JSON.stringify(links)); } catch(e) {} }

function getTag(title) {
  var t = title.toLowerCase();
  if (t.indexOf('jurídico') !== -1 || t.indexOf('juridico') !== -1 || t.indexOf('relatório') !== -1) return { cls: 'tag-juridico', label: 'Jurídico' };
  if (t.indexOf('extensão') !== -1 || t.indexOf('extensao') !== -1) return { cls: 'tag-extensao', label: 'Extensão' };
  if (t.indexOf('cobrança') !== -1 || t.indexOf('cobranca') !== -1) return { cls: 'tag-cobranca', label: 'Cobrança' };
  if (t.indexOf('ios') !== -1 || t.indexOf('atalho') !== -1) return { cls: 'tag-ios', label: 'iOS' };
  if (t.indexOf('asaas') !== -1) return { cls: 'tag-kaes', label: 'Asaas' };
  if (t.indexOf('kaes') !== -1 || t.indexOf('contratos') !== -1) return { cls: 'tag-kaes', label: 'KAES' };
  return null;
}

function toggleForm() {
  var f = document.getElementById('addForm');
  f.classList.toggle('open');
  if (f.classList.contains('open')) { document.getElementById('newTitle').focus(); }
  else { document.getElementById('newTitle').value = ''; document.getElementById('newUrl').value = ''; }
}

function saveLink() {
  var url = document.getElementById('newUrl').value.trim();
  var title = document.getElementById('newTitle').value.trim();
  if (!url) { document.getElementById('newUrl').focus(); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  var links = load();
  links.unshift({ id: Date.now(), title: title || url, url: url });
  save(links);
  toggleForm();
  renderList();
}

function deleteLink(id) {
  if (!confirm('Remover este link?')) return;
  save(load().filter(function(l) { return l.id !== id; }));
  renderList();
}

function getFavicon(url) {
  try { return 'https://www.google.com/s2/favicons?domain=' + new URL(url).hostname + '&sz=32'; }
  catch(e) { return ''; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var WORLD_SVG  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>';
var OPEN_SVG   = '<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
var TRASH_SVG  = '<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>';
var EMPTY_SVG  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';

document.addEventListener('error', function(e) {
  if (e.target.tagName === 'IMG' && e.target.closest('.favicon')) {
    e.target.closest('.favicon').innerHTML = WORLD_SVG;
  }
}, true);

function renderList() {
  var q = document.getElementById('search').value.toLowerCase();
  var all = load();
  var links = all.filter(function(l) {
    return l.title.toLowerCase().indexOf(q) !== -1 || l.url.toLowerCase().indexOf(q) !== -1;
  });

  document.getElementById('badge').textContent = all.length;
  var countEl = document.getElementById('countEl');
  if (q) {
    countEl.textContent = links.length + ' de ' + all.length + (all.length !== 1 ? ' links' : ' link');
  } else {
    countEl.textContent = all.length ? all.length + (all.length !== 1 ? ' links salvos' : ' link salvo') : '';
  }

  var list = document.getElementById('list');
  if (!links.length) {
    var msg = all.length === 0
      ? 'Nenhum link ainda. Clique em <strong>Novo link</strong> para começar.'
      : 'Nenhum resultado para "' + esc(q) + '".';
    list.innerHTML = '<div class="empty">' + EMPTY_SVG + msg + '</div>';
    return;
  }

  list.innerHTML = links.map(function(l) {
    var fav = getFavicon(l.url);
    var favHtml = fav ? '<img src="' + esc(fav) + '" alt="" width="18" height="18"/>' : WORLD_SVG;
    var tag = getTag(l.title);
    var tagHtml = tag ? '<span class="link-tag ' + tag.cls + '">' + tag.label + '</span>' : '';
    return '<div class="link-item">' +
      '<div class="favicon">' + favHtml + '</div>' +
      '<div class="link-info">' +
        '<div class="link-title">' + esc(l.title) + '</div>' +
        '<div class="link-url">' + esc(l.url) + '</div>' +
      '</div>' +
      tagHtml +
      '<div class="link-actions">' +
        '<a href="' + esc(l.url) + '" target="_blank" rel="noopener" class="icon-btn" title="Abrir">' + OPEN_SVG + '</a>' +
        '<button class="icon-btn danger" onclick="deleteLink(' + l.id + ')" title="Remover">' + TRASH_SVG + '</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

document.getElementById('newUrl').addEventListener('keydown', function(e) { if (e.key === 'Enter') saveLink(); });
document.getElementById('newTitle').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('newUrl').focus(); });
document.getElementById('search').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { document.getElementById('search').value = ''; renderList(); }
});

renderList();
</script>
</body>
</html>
